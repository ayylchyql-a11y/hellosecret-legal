<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HelloSecret</title>
<style>
  :root{
    --bg:#14110d; --card:#1f1a14; --border:#2c251d;
    --text:#ECE6DD; --muted:#9b9089; --accent:#7CC6A2;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px; padding:40px 24px; text-align:center}
  .dot{width:18px; height:18px; border-radius:50%; background:var(--accent); box-shadow:0 0 22px var(--accent); margin:0 auto 18px}
  h1{font-size:30px; letter-spacing:1px; margin:0 0 8px}
  .tag{color:var(--muted); font-size:15px; margin-bottom:34px}
  .links{display:flex; flex-direction:column; gap:12px}
  a.btn{
    display:block; padding:15px; border-radius:14px; text-decoration:none;
    background:var(--card); border:1px solid var(--border); color:var(--text); font-size:15px;
  }
  a.btn:hover{border-color:var(--accent)}
  .foot{margin-top:30px; color:var(--muted); font-size:13px}
  .foot a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="dot"></div>
  <h1>Hello Secret</h1>
  <div class="tag">Say it once. Be understood. Then let it go.</div>
  <div class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="terms.html">Terms of Service</a>
  </div>
  <div class="foot">Contact: <a href="mailto:ayylchyql@gmail.com">ayylchyql@gmail.com</a></div>
</div>
</body>
</html>
